version: '3.8'

services:
  ollama:
    image: ollama/ollama:rocm
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - "/var/lib/door/ollama:/root/.ollama"
    devices:
      - /dev/kfd
      - /dev/dri

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    depends_on:
      - ollama
    ports:
      - "${OPENWEBUI_PORT:-3000}:8080"
    volumes:
      - "/var/lib/door/open-webui:/app/backend/data"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  ollama:
  open-webui: